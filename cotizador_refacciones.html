<!DOCTYPE html>
<html lang="es-MX">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Cotizador de Refacciones · Michelin Grimaldi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A0E1A;
  --surface:#111827;
  --surface2:#1C2537;
  --border:#2A3550;
  --yellow:#F5C518;
  --yellow-dim:#C9A114;
  --blue:#3B82F6;
  --green:#10B981;
  --red:#EF4444;
  --text:#E8ECF4;
  --muted:#6B7A99;
  --card:#161F33;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:40px}

/* HEADER */
.header{background:var(--surface);border-bottom:2px solid var(--yellow);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-brand{display:flex;flex-direction:column}
.brand-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1.3rem;letter-spacing:.05em;color:var(--yellow)}
.brand-sub{font-size:.7rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.header-badge{background:var(--yellow);color:#000;font-family:'DM Mono',monospace;font-size:.65rem;font-weight:500;padding:4px 10px;border-radius:4px}

/* MAIN */
.main{max-width:680px;margin:0 auto;padding:16px}

/* SECTION LABEL */
.sec-label{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;margin-top:20px}

/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}

/* INPUTS */
.field{margin-bottom:12px}
.field label{display:block;font-size:.75rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:.9rem;font-family:'Barlow',sans-serif;color:var(--text);outline:none;transition:border-color .2s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--yellow)}
.field select option{background:var(--surface)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

/* TIPO CLIENTE TOGGLE */
.tipo-btns{display:flex;gap:6px;flex-wrap:wrap}
.tipo-btn{flex:1;padding:9px 6px;border:1px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.85rem;letter-spacing:.05em;cursor:pointer;text-align:center;transition:all .2s}
.tipo-btn.active{border-color:var(--yellow);background:rgba(245,197,24,.12);color:var(--yellow)}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:10px}
.search-wrap input{padding-left:36px}
.search-wrap .ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.9rem}
.results-list{background:var(--surface2);border:1px solid var(--border);border-radius:8px;max-height:220px;overflow-y:auto;display:none}
.results-list.open{display:block}
.result-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;transition:background .15s}
.result-item:last-child{border-bottom:none}
.result-item:active{background:var(--surface)}
.result-item .ri-name{font-size:.85rem;color:var(--text)}
.result-item .ri-cat{font-size:.7rem;color:var(--muted);margin-top:2px}
.result-item .ri-price{font-family:'DM Mono',monospace;font-size:.85rem;color:var(--yellow);white-space:nowrap}

/* ITEMS TABLE */
.items-header{display:grid;grid-template-columns:auto 60px 90px 80px 36px;gap:6px;padding:6px 8px;font-size:.65rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.item-row{display:grid;grid-template-columns:auto 60px 90px 80px 36px;gap:6px;align-items:center;padding:8px;background:var(--surface2);border-radius:8px;margin-bottom:5px;border:1px solid var(--border)}
.item-row .i-desc{font-size:.8rem;line-height:1.3}
.item-row .i-cg{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--muted)}
.item-row .i-qty input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:4px 6px;font-size:.8rem;color:var(--text);text-align:center;font-family:'DM Mono',monospace}
.item-row .i-prov select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:4px 4px;font-size:.68rem;color:var(--text)}
.item-row .i-price{font-family:'DM Mono',monospace;font-size:.82rem;color:var(--yellow);text-align:right}
.item-row .i-del button{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--red);cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center}
.item-row .i-urg{font-size:.62rem;padding:2px 6px;border-radius:4px;display:inline-block;margin-top:3px}
.urg-1{background:rgba(16,185,129,.15);color:var(--green)}
.urg-2{background:rgba(245,197,24,.15);color:var(--yellow)}
.urg-3{background:rgba(239,68,68,.15);color:var(--red)}

/* TOTAL */
.total-card{background:var(--surface);border:1px solid var(--yellow);border-radius:12px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;margin-top:12px}
.total-label{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
.total-amount{font-family:'DM Mono',monospace;font-size:1.6rem;font-weight:500;color:var(--yellow)}

/* BUTTONS */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:13px 18px;border-radius:10px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1rem;letter-spacing:.05em;cursor:pointer;border:none;transition:all .2s;width:100%}
.btn-wa{background:#25D366;color:#000}
.btn-wa:active{background:#1da851}
.btn-copy{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-copy:active{background:var(--surface)}
.btn-add{background:var(--surface2);color:var(--yellow);border:1px solid var(--yellow);margin-top:8px}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}

/* EMPTY */
.empty{text-align:center;padding:24px;color:var(--muted);font-size:.85rem}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface);border:1px solid var(--yellow);border-radius:10px;padding:10px 20px;font-size:.85rem;z-index:999;transition:transform .3s;white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}

/* PRESUPUESTO PREVIEW */
.preview-box{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;font-family:'DM Mono',monospace;font-size:.75rem;color:var(--text);line-height:1.6;white-space:pre-wrap;margin-top:10px;display:none}
</style>
</head>
<body>

<div class="header">
  <div class="header-brand">
    <div class="brand-title">MICHELIN · Grimaldi</div>
    <div class="brand-sub">Cotizador de Refacciones 2025</div>
  </div>
  <div class="header-badge">v1.0</div>
</div>

<div class="main">

  <!-- DATOS DEL PRESUPUESTO -->
  <div class="sec-label">Datos del Presupuesto</div>
  <div class="card">
    <div class="field-row">
      <div class="field">
        <label>Asesor</label>
        <select id="asesor">
          <option value="">— Seleccionar —</option>
          <option value="VICTOR BOLAÑOS">VICTOR BOLAÑOS</option>
          <option value="MARTHA AMBRIZ">MARTHA AMBRIZ</option>
          <option value="ERIKA JULIAN">ERIKA JULIAN</option>
          <option value="ALEJANDRA OLMEDO">ALEJANDRA OLMEDO</option>
          <option value="RUBY RIZO">RUBY RIZO</option>
          <option value="VICENTE CANCHE">VICENTE CANCHE</option>
          <option value="XIPATLY MALDONADO">XIPATLY MALDONADO</option>
        </select>
      </div>
      <div class="field">
        <label>Fecha</label>
        <input type="date" id="fecha">
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Cliente</label>
        <input type="text" id="cliente" placeholder="Nombre del cliente">
      </div>
      <div class="field">
        <label>Teléfono</label>
        <input type="tel" id="telefono" placeholder="10 dígitos">
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Vehículo</label>
        <input type="text" id="auto" placeholder="Ej: ODYSSEY 2013">
      </div>
      <div class="field">
        <label>OS / Folio</label>
        <input type="text" id="os" placeholder="Número de orden">
      </div>
    </div>
  </div>

  <!-- TIPO DE CLIENTE -->
  <div class="sec-label">Tipo de Cliente</div>
  <div class="card">
    <div class="tipo-btns">
      <button class="tipo-btn active" onclick="setTipo('flotilla')">FLOTILLA</button>
      <button class="tipo-btn" onclick="setTipo('publico')">PÚBLICO</button>
      <button class="tipo-btn" onclick="setTipo('premium')">PREMIUM</button>
    </div>
  </div>

  <!-- AGREGAR SERVICIO -->
  <div class="sec-label">Agregar Servicio / Refacción</div>
  <div class="card">
    <div class="search-wrap">
      <span class="ico">🔍</span>
      <input type="search" id="svc-search" placeholder="Buscar por nombre o código (ej: BM, FLECHA, BALERO)..." oninput="searchSvc()" autocomplete="off">
      <div class="results-list" id="results-list"></div>
    </div>
    <div class="field-row3">
      <div class="field">
        <label>Proveedor</label>
        <select id="svc-prov">
          <option value="AUTOZONE">AUTOZONE</option>
          <option value="FRAMEX">FRAMEX</option>
          <option value="REF. RINCÓN">REF. RINCÓN</option>
          <option value="BIG AUTO">BIG AUTO</option>
          <option value="OTRO">OTRO</option>
        </select>
      </div>
      <div class="field">
        <label>Disponibilidad</label>
        <select id="svc-disp">
          <option value="INMEDIATA">INMEDIATA</option>
          <option value="24 HRS">24 HRS</option>
          <option value="48 HRS">48 HRS</option>
          <option value="PEDIDO">PEDIDO</option>
        </select>
      </div>
      <div class="field">
        <label>Urgencia</label>
        <select id="svc-urg">
          <option value="1">1 — Normal</option>
          <option value="2">2 — Importante</option>
          <option value="3">3 — Urgente</option>
        </select>
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Cantidad</label>
        <input type="number" id="svc-qty" value="1" min="1" step="1">
      </div>
      <div class="field">
        <label>Precio unitario</label>
        <input type="number" id="svc-price" placeholder="0.00" step="0.01">
      </div>
    </div>
    <button class="btn btn-add" onclick="addItem()">＋ Agregar al presupuesto</button>
  </div>

  <!-- ITEMS -->
  <div class="sec-label">Presupuesto</div>
  <div id="items-container">
    <div class="empty" id="empty-msg">Sin servicios agregados aún.</div>
  </div>

  <div class="total-card">
    <span class="total-label">Total</span>
    <span class="total-amount" id="total-display">$0.00</span>
  </div>

  <!-- PREVIEW -->
  <div class="sec-label" id="prev-label" style="display:none">Vista previa del mensaje</div>
  <pre class="preview-box" id="preview-box"></pre>

  <div class="btn-row" style="margin-top:16px">
    <button class="btn btn-copy" onclick="copyMsg()">📋 Copiar</button>
    <button class="btn btn-wa" onclick="sendWA()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.122 1.533 5.858L0 24l6.335-1.521A11.942 11.942 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.848 0-3.575-.5-5.065-1.373l-.361-.216-3.75.9.937-3.659-.236-.374A9.96 9.96 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>
      Enviar WA
    </button>
  </div>

  <div style="margin-top:10px">
    <button class="btn btn-copy" onclick="clearAll()" style="color:var(--red);border-color:var(--red)">🗑 Limpiar todo</button>
  </div>

</div>

<div class="toast" id="toast"></div>

// ── STATE ────────────────────────────────────────────────────────────────────
let tipoCliente = 'flotilla';
let items = [];
let selectedSvc = null;

// ── INIT ─────────────────────────────────────────────────────────────────────
document.getElementById('fecha').value = new Date().toISOString().split('T')[0];

function setTipo(t){
  tipoCliente = t;
  document.querySelectorAll('.tipo-btn').forEach(b=>{
    b.classList.toggle('active', b.textContent.trim().toLowerCase()===t ||
      (t==='flotilla'&&b.textContent.includes('FLOTILLA'))||
      (t==='publico'&&b.textContent.includes('PÚBLICO'))||
      (t==='premium'&&b.textContent.includes('PREMIUM')));
  });
  // Recalc prices on existing items
  recalcAll();
}

function getPrice(svc){
  if(tipoCliente==='flotilla') return svc.f;
  if(tipoCliente==='premium') return svc.pr;
  return svc.p;
}

// ── SEARCH ───────────────────────────────────────────────────────────────────
function searchSvc(){
  const q = document.getElementById('svc-search').value.toUpperCase().trim();
  const list = document.getElementById('results-list');
  if(!q){ list.classList.remove('open'); selectedSvc=null; return; }

  const hits = CATALOG.filter(s=>
    s.cg.toUpperCase().includes(q)||
    s.desc.toUpperCase().includes(q)||
    (s.nom&&s.nom.toUpperCase().includes(q))
  ).slice(0,12);

  if(!hits.length){ list.classList.remove('open'); return; }

  list.innerHTML = hits.map(s=>`
    <div class="result-item" onclick="selectSvc('${s.cg}')">
      <div>
        <div class="ri-name">${s.desc}</div>
        <div class="ri-cat">${s.cg} · ${s.cat} ${s.nom?'· '+s.nom:''}</div>
      </div>
      <div class="ri-price">$${getPrice(s).toFixed(2)}</div>
    </div>
  `).join('');
  list.classList.add('open');
}

function selectSvc(cg){
  const svc = CATALOG.find(s=>s.cg===cg);
  if(!svc) return;
  selectedSvc = svc;
  document.getElementById('svc-search').value = `${svc.cg} — ${svc.desc}`;
  document.getElementById('svc-price').value = getPrice(svc).toFixed(2);
  document.getElementById('results-list').classList.remove('open');
}

document.addEventListener('click', e=>{
  if(!e.target.closest('.search-wrap')) document.getElementById('results-list').classList.remove('open');
});

// ── ADD ITEM ─────────────────────────────────────────────────────────────────
function addItem(){
  const price = parseFloat(document.getElementById('svc-price').value)||0;
  const qty = parseInt(document.getElementById('svc-qty').value)||1;
  const prov = document.getElementById('svc-prov').value;
  const disp = document.getElementById('svc-disp').value;
  const urg = document.getElementById('svc-urg').value;

  if(!selectedSvc && !price){
    toast('⚠️ Selecciona un servicio primero'); return;
  }

  const desc = selectedSvc ? selectedSvc.desc : document.getElementById('svc-search').value||'Servicio';
  const cg = selectedSvc ? selectedSvc.cg : '';
  const cat = selectedSvc ? selectedSvc.cat : '';

  items.push({ id: Date.now(), desc, cg, cat, qty, price, prov, disp, urg });
  render();
  // Reset
  document.getElementById('svc-search').value='';
  document.getElementById('svc-price').value='';
  document.getElementById('svc-qty').value='1';
  selectedSvc=null;
  toast('✅ Agregado al presupuesto');
}

function removeItem(id){
  items = items.filter(i=>i.id!==id);
  render();
}

function recalcAll(){
  // When tipo changes, update prices that match catalog
  items = items.map(item=>{
    const svc = CATALOG.find(s=>s.cg===item.cg);
    if(svc) item.price = getPrice(svc);
    return item;
  });
  render();
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  const container = document.getElementById('items-container');
  const empty = document.getElementById('empty-msg');

  if(!items.length){
    container.innerHTML='<div class="empty" id="empty-msg">Sin servicios agregados aún.</div>';
    document.getElementById('total-display').textContent='$0.00';
    document.getElementById('preview-box').style.display='none';
    document.getElementById('prev-label').style.display='none';
    return;
  }

  const urgLabels = {1:'Normal',2:'Importante',3:'Urgente'};
  container.innerHTML = `
    <div class="items-header">
      <span>Descripción</span><span style="text-align:center">Cant</span><span>Proveedor</span><span style="text-align:right">Total</span><span></span>
    </div>
    ${items.map(item=>`
      <div class="item-row">
        <div>
          <div class="i-desc">${item.desc}</div>
          <div class="i-cg">${item.cg} ${item.cat?'· '+item.cat:''} · ${item.disp}</div>
          <span class="i-urg urg-${item.urg}">${urgLabels[item.urg]||'Normal'}</span>
        </div>
        <div class="i-qty"><input type="number" value="${item.qty}" min="1" onchange="updateQty(${item.id},this.value)"></div>
        <div class="i-prov">
          <select onchange="updateProv(${item.id},this.value)">
            ${['AUTOZONE','FRAMEX','REF. RINCÓN','BIG AUTO','OTRO'].map(p=>`<option${p===item.prov?' selected':''}>${p}</option>`).join('')}
          </select>
        </div>
        <div class="i-price">$${(item.price*item.qty).toFixed(2)}</div>
        <div class="i-del"><button onclick="removeItem(${item.id})">✕</button></div>
      </div>
    `).join('')}
  `;

  const total = items.reduce((s,i)=>s+i.price*i.qty,0);
  document.getElementById('total-display').textContent=`$${total.toFixed(2)}`;
  updatePreview();
  document.getElementById('preview-box').style.display='block';
  document.getElementById('prev-label').style.display='block';
}

function updateQty(id,val){
  const item=items.find(i=>i.id===id);
  if(item){ item.qty=parseInt(val)||1; render(); }
}
function updateProv(id,val){
  const item=items.find(i=>i.id===id);
  if(item){ item.prov=val; }
}

// ── PREVIEW / MESSAGE ─────────────────────────────────────────────────────────
function buildMsg(){
  const asesor = document.getElementById('asesor').value||'Su asesor';
  const cliente = document.getElementById('cliente').value||'Estimado Cliente';
  const auto = document.getElementById('auto').value||'su vehículo';
  const os = document.getElementById('os').value||'';
  const fecha = document.getElementById('fecha').value||new Date().toLocaleDateString('es-MX');
  const tipo = tipoCliente==='flotilla'?'Flotilla':tipoCliente==='premium'?'Premium':'Público';
  const total = items.reduce((s,i)=>s+i.price*i.qty,0);

  let msg = `*Multillantas y Servicios Grimaldi S.A. de C.V.*\n`;
  msg += `*PRESUPUESTO*\n`;
  msg += `${'─'.repeat(30)}\n`;
  if(os) msg += `📋 OS: ${os}\n`;
  msg += `📅 Fecha: ${fecha}\n`;
  msg += `🚗 Vehículo: *${auto}*\n`;
  msg += `👤 Asesor: ${asesor}\n`;
  msg += `💼 Tipo: ${tipo}\n`;
  msg += `${'─'.repeat(30)}\n\n`;
  msg += `Estimado/a *${cliente}*, por este medio le hacemos llegar el presupuesto solicitado:\n\n`;

  items.forEach((item,i)=>{
    const urgStr = item.urg==='3'?'🔴':item.urg==='2'?'🟡':'🟢';
    msg += `${urgStr} *${i+1}. ${item.desc}*\n`;
    if(item.cg) msg += `   Código: ${item.cg}\n`;
    msg += `   Cant: ${item.qty} | Proveedor: ${item.prov}\n`;
    msg += `   Disponibilidad: ${item.disp}\n`;
    msg += `   Precio: $${(item.price*item.qty).toFixed(2)}\n\n`;
  });

  msg += `${'─'.repeat(30)}\n`;
  msg += `💰 *TOTAL: $${total.toFixed(2)} MXN*\n`;
  msg += `${'─'.repeat(30)}\n\n`;
  msg += `Precios sujetos a cambio sin previo aviso.\n`;
  msg += `Cualquier duda, con gusto le atendemos. 🤝`;
  return msg;
}

function updatePreview(){
  if(!items.length) return;
  document.getElementById('preview-box').textContent = buildMsg();
}

function copyMsg(){
  if(!items.length){ toast('⚠️ Sin servicios en el presupuesto'); return; }
  navigator.clipboard.writeText(buildMsg()).then(()=>toast('📋 Copiado al portapapeles'));
}

function sendWA(){
  if(!items.length){ toast('⚠️ Sin servicios en el presupuesto'); return; }
  const tel = document.getElementById('telefono').value.replace(/\D/g,'');
  const msg = encodeURIComponent(buildMsg());
  const url = tel ? `https://wa.me/52${tel}?text=${msg}` : `https://wa.me/?text=${msg}`;
  window.open(url,'_blank');
}

function clearAll(){
  if(!confirm('¿Limpiar todo el presupuesto?')) return;
  items=[];
  selectedSvc=null;
  document.getElementById('cliente').value='';
  document.getElementById('telefono').value='';
  document.getElementById('auto').value='';
  document.getElementById('os').value='';
  document.getElementById('svc-search').value='';
  document.getElementById('svc-price').value='';
  document.getElementById('asesor').value='';
  render();
  toast('🗑 Presupuesto limpiado');
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
